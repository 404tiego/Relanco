<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relanco</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0A0A0A;
      color: #e5e5e5;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid rgba(212, 168, 67, 0.12);
    }
    .logo-dot {
      width: 14px;
      height: 14px;
      background: #D4A843;
      border-radius: 3px;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #D4A843;
      letter-spacing: 0.5px;
    }
    .content {
      padding: 16px;
    }

    /* ── Non connecté ── */
    .form-group {
      margin-bottom: 12px;
    }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid rgba(212, 168, 67, 0.15);
      background: rgba(255, 255, 255, 0.04);
      color: #f0f0f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      border-color: #D4A843;
    }
    .form-input::placeholder {
      color: #555;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
    }
    .btn-primary {
      background: #D4A843;
      color: #08090A;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: wait;
    }
    .error-msg {
      color: #f87171;
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
    }

    /* ── Connecté ── */
    .user-info {
      margin-bottom: 14px;
    }
    .user-name {
      font-size: 15px;
      font-weight: 600;
      color: #f0f0f0;
    }
    .user-concession {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.15);
      margin-bottom: 12px;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #22C55E;
    }
    .toggle-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }
    .counter {
      text-align: center;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      background: rgba(212, 168, 67, 0.06);
      border: 1px solid rgba(212, 168, 67, 0.12);
    }
    .counter-value {
      font-size: 22px;
      font-weight: 700;
      color: #D4A843;
    }
    .counter-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(212, 168, 67, 0.25);
      color: #D4A843;
      margin-bottom: 8px;
    }
    .btn-outline:hover {
      background: rgba(212, 168, 67, 0.08);
    }
    .btn-danger {
      background: transparent;
      border: 1px solid rgba(248, 113, 113, 0.25);
      color: #f87171;
      font-size: 12px;
      padding: 8px;
    }
    .btn-danger:hover {
      background: rgba(248, 113, 113, 0.08);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">Relanco</div>
  </div>

  <div class="content">
    <!-- État non connecté -->
    <div id="login-view">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="directeur@concession.fr">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••">
      </div>
      <button id="login-btn" class="btn btn-primary">Se connecter</button>
      <div id="login-error" class="error-msg hidden"></div>
    </div>

    <!-- État connecté -->
    <div id="connected-view" class="hidden">
      <div class="user-info">
        <div class="user-name" id="user-name">Bonjour</div>
        <div class="user-concession" id="user-concession">Concession automobile</div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Agent IA actif</span>
        <div class="toggle-dot"></div>
      </div>
      <div class="counter">
        <div class="counter-value" id="counter-value">0</div>
        <div class="counter-label">réponses générées aujourd'hui</div>
      </div>
      <a href="https://saas-1.replit.app" target="_blank" class="btn btn-outline">Voir mon dashboard</a>
      <button id="logout-btn" class="btn btn-danger">Se déconnecter</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
